apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dam-plugin
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - plugin.your-domain.com
    secretName: dam-plugin-tls
  rules:
  - host: plugin.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dam-plugin
            port:
              number: 80
