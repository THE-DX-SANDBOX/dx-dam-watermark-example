{{- if .Values.serviceDiscovery.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dam-plugin.fullname" . }}-discovery
  namespace: {{ .Values.serviceDiscovery.haproxyNamespace }}
  labels:
    {{- include "dam-plugin.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services/status"]
  verbs: ["get"]
{{- end }}
