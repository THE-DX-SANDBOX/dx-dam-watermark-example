{{- if .Values.serviceDiscovery.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dam-plugin.fullname" . }}-discovery
  namespace: {{ .Values.serviceDiscovery.haproxyNamespace }}
  labels:
    {{- include "dam-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "dam-plugin.fullname" . }}-discovery
subjects:
- kind: ServiceAccount
  name: {{ include "dam-plugin.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
